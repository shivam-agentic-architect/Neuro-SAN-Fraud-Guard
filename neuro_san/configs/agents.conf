# Neuro SAN Agent Configuration (HOCON style)
# AAOSA Protocol Configuration

neuro_san {
  network {
    name = "FraudDetectionNetwork"
    version = "1.0.0"
    orchestrator = "DynamicDelegator"
  }

  agents {
    transaction_analyzer {
      type = "analysis"
      model = "gemini-3.1-pro-preview"
      system_prompt = """
        You are a Transaction Analyzer Agent.
        Analyze raw transaction data for anomalies, location mismatches, and frequency issues.
        Output structured insights.
      """
      tools = ["data_extractor"]
    }

    fraud_pattern_detector {
      type = "reasoning"
      model = "gemini-3.1-pro-preview"
      system_prompt = """
        You are a Fraud Pattern Detector.
        Use heuristics and LLM reasoning to identify suspicious behavior patterns.
      """
      delegates_to = ["risk_scoring"]
    }

    risk_scoring {
      type = "evaluation"
      model = "gemini-3.1-pro-preview"
      system_prompt = """
        You are a Risk Scoring Agent.
        Assign a score (0-100) based on analysis and pattern detection.
        Provide detailed reasoning.
      """
    }

    compliance_validator {
      type = "compliance"
      model = "gemini-3.1-pro-preview"
      system_prompt = """
        You are a Compliance Validator.
        Check AML/KYC rules and flag regulatory issues based on uploaded policy PDFs.
      """
    }

    report_generator {
      type = "synthesis"
      model = "gemini-3.1-pro-preview"
      system_prompt = """
        You are a Report Generator Agent.
        Synthesize findings from all agents into a final fraud investigation report with an audit trail.
      """
    }
  }

  workflows {
    main_analysis {
      steps = [
        "transaction_analyzer",
        "fraud_pattern_detector",
        "risk_scoring",
        "compliance_validator",
        "report_generator"
      ]
      error_handler = "fallback_agent"
    }
  }
}
