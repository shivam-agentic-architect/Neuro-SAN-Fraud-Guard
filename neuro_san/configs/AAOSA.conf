# AAOSA (Agentic Adaptive Open System Architecture) Protocol Def
# This defines how agents communicate and synchronize state.

aaosa {
  protocol {
    version = "2.1"
    message_format = "JSON-RPC-2.0"
    transport = "grpc-over-http2"
  }

  discovery {
    registry = "consul"
    tags = ["agent", "neuro-san", "fraud-guard"]
  }

  security {
    encryption = "AES-256-GCM"
    authentication = "OIDC"
  }

  delegation {
    strategy = "CapabilityBased"
    max_depth = 5
    retry_policy {
      max_attempts = 3
      backoff = "exponential"
    }
  }
}
